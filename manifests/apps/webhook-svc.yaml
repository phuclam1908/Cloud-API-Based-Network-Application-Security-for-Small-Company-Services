apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-svc
  namespace: apps
  labels:
    app: webhook-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-svc
  template:
    metadata:
      labels:
        app: webhook-svc
    spec:
      containers:
      - name: webhook-svc
        image: docker.io/library/webhook-svc:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: WEBHOOK_SECRET
          value: "nt219-webhook-secret-key-2026"
        resources:
          requests:
            memory: "64Mi"
            cpu: "10m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-svc
  namespace: apps
spec:
  selector:
    app: webhook-svc
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
