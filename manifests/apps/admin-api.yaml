apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-api
  namespace: apps
  labels:
    app: admin-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-api
  template:
    metadata:
      labels:
        app: admin-api
    spec:
      containers:
      - name: admin-api
        image: docker.io/library/admin-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: JWKS_URL
          value: "http://keycloak.keycloak.svc.cluster.local/realms/company/protocol/openid-connect/certs"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: admin-api
  namespace: apps
spec:
  selector:
    app: admin-api
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
