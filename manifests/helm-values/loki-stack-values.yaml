loki:
  enabled: true
  persistence:
    enabled: true
    size: 2Gi
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 300m

promtail:
  enabled: true
  resources:
    requests:
      memory: 32Mi
      cpu: 25m
    limits:
      memory: 256Mi
      cpu: 150m

grafana:
  enabled: true
  service:
    type: NodePort
    nodePort: 32300
  adminPassword: "Grafana1234!"
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 300m
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Loki
        type: loki
        url: http://loki-stack:3100
        isDefault: true

prometheus:
  enabled: false
